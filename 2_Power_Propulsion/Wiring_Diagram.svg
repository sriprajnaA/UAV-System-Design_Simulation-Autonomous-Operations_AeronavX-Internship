<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" role="img">
<title>AeroNavX Wiring Layout Diagram</title>
<desc>Complete electrical wiring diagram for AeroNavX quadcopter</desc>
<style>
  text { font-family: Arial, sans-serif; fill: #1a1a1a; }
  .th { font-size: 14px; font-weight: 600; }
  .ts { font-size: 12px; }
  .box-amber { fill: #FAEEDA; stroke: #BA7517; }
  .box-red   { fill: #FCEBEB; stroke: #A32D2D; }
  .box-teal  { fill: #E1F5EE; stroke: #0F6E56; }
  .box-blue  { fill: #E6F1FB; stroke: #185FA5; }
  .box-green { fill: #EAF3DE; stroke: #3B6D11; }
  .box-purple{ fill: #EEEDFE; stroke: #534AB7; }
  .box-coral { fill: #FAECE7; stroke: #993C1D; }
  .box-gray  { fill: #F1EFE8; stroke: #5F5E5A; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<!-- Legend -->
<rect x="20" y="20" width="200" height="110" rx="8" fill="none" stroke="#AAAAAA" stroke-width="0.5"/>
<text class="th" x="120" y="38" text-anchor="middle">Legend</text>
<line x1="32" y1="52" x2="72" y2="52" stroke="#E24B4A" stroke-width="2.5" marker-end="url(#arrow)"/>
<text class="ts" x="78" y="56">Power (high current)</text>
<line x1="32" y1="70" x2="72" y2="70" stroke="#378ADD" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="78" y="74">Signal / PWM</text>
<line x1="32" y1="88" x2="72" y2="88" stroke="#639922" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="78" y="92">Data / UART / I2C</text>
<line x1="32" y1="106" x2="72" y2="106" stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="78" y="110">5V regulated</text>
<!-- BATTERY -->
<rect class="box-amber" x="260" y="20" width="160" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="43" text-anchor="middle">Battery</text>
<text class="ts" x="340" y="61" text-anchor="middle">Tattu 4S 5200mAh 14.8V</text>
<!-- Battery to PDB -->
<line x1="340" y1="72" x2="340" y2="118" stroke="#E24B4A" stroke-width="2.5" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="100" fill="#E24B4A">XT60</text>
<!-- PDB -->
<rect class="box-red" x="240" y="118" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="141" text-anchor="middle">PDB</text>
<text class="ts" x="340" y="159" text-anchor="middle">Power Distribution Board</text>
<!-- PDB to ESCs (power) -->
<path d="M256 170 L200 220 L160 220" fill="none" stroke="#E24B4A" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M424 170 L480 220 L520 220" fill="none" stroke="#E24B4A" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M256 170 L200 330 L160 330" fill="none" stroke="#E24B4A" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M424 170 L480 330 L520 330" fill="none" stroke="#E24B4A" stroke-width="2" marker-end="url(#arrow)"/>
<!-- PDB to Pixhawk -->
<line x1="340" y1="170" x2="340" y2="248" stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="210" fill="#EF9F27">5V/2A</text>
<!-- ESCs -->
<rect class="box-teal" x="80" y="196" width="80" height="48" rx="6" stroke-width="0.5"/>
<text class="th" x="120" y="217" text-anchor="middle">ESC 1</text>
<text class="ts" x="120" y="233" text-anchor="middle">Front-left</text>
<rect class="box-teal" x="520" y="196" width="80" height="48" rx="6" stroke-width="0.5"/>
<text class="th" x="560" y="217" text-anchor="middle">ESC 2</text>
<text class="ts" x="560" y="233" text-anchor="middle">Front-right</text>
<rect class="box-teal" x="80" y="306" width="80" height="48" rx="6" stroke-width="0.5"/>
<text class="th" x="120" y="327" text-anchor="middle">ESC 3</text>
<text class="ts" x="120" y="343" text-anchor="middle">Rear-left</text>
<rect class="box-teal" x="520" y="306" width="80" height="48" rx="6" stroke-width="0.5"/>
<text class="th" x="560" y="327" text-anchor="middle">ESC 4</text>
<text class="ts" x="560" y="343" text-anchor="middle">Rear-right</text>
<!-- Motors -->
<line x1="80" y1="214" x2="40" y2="214" stroke="#E24B4A" stroke-width="2" marker-end="url(#arrow)"/>
<rect class="box-gray" x="8" y="200" width="32" height="28" rx="4" stroke-width="0.5"/>
<text class="ts" x="24" y="218" text-anchor="middle">M1</text>
<text class="ts" x="30" y="237">CCW</text>
<line x1="600" y1="214" x2="640" y2="214" stroke="#E24B4A" stroke-width="2" marker-end="url(#arrow)"/>
<rect class="box-gray" x="640" y="200" width="32" height="28" rx="4" stroke-width="0.5"/>
<text class="ts" x="656" y="218" text-anchor="middle">M2</text>
<text class="ts" x="634" y="237">CW</text>
<line x1="80" y1="322" x2="40" y2="322" stroke="#E24B4A" stroke-width="2" marker-end="url(#arrow)"/>
<rect class="box-gray" x="8" y="308" width="32" height="28" rx="4" stroke-width="0.5"/>
<text class="ts" x="24" y="326" text-anchor="middle">M3</text>
<text class="ts" x="30" y="347">CW</text>
<line x1="600" y1="322" x2="640" y2="322" stroke="#E24B4A" stroke-width="2" marker-end="url(#arrow)"/>
<rect class="box-gray" x="640" y="308" width="32" height="28" rx="4" stroke-width="0.5"/>
<text class="ts" x="656" y="326" text-anchor="middle">M4</text>
<text class="ts" x="634" y="347">CCW</text>
<!-- PIXHAWK -->
<rect class="box-blue" x="256" y="248" width="168" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="272" text-anchor="middle">Pixhawk 2.4.8</text>
<text class="ts" x="340" y="292" text-anchor="middle">Flight Controller (ArduPilot)</text>
<!-- PWM signals to ESCs -->
<path d="M260 265 L200 265 L160 244" fill="none" stroke="#378ADD" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow2)"/>
<path d="M420 265 L480 265 L520 244" fill="none" stroke="#378ADD" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow2)"/>
<path d="M260 295 L200 295 L160 330" fill="none" stroke="#378ADD" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow2)"/>
<path d="M420 295 L480 295 L520 330" fill="none" stroke="#378ADD" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow2)"/>
<!-- Pixhawk to GPS -->
<line x1="340" y1="308" x2="340" y2="380" stroke="#639922" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="350" fill="#639922">GPS/I2C</text>
<!-- GPS -->
<rect class="box-green" x="270" y="380" width="140" height="44" rx="6" stroke-width="0.5"/>
<text class="th" x="340" y="398" text-anchor="middle">GPS Module</text>
<text class="ts" x="340" y="414" text-anchor="middle">u-blox M8N</text>
<!-- Pixhawk to RPi UART -->
<path d="M256 278 L180 278 L180 450 L246 450" fill="none" stroke="#639922" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="148" y="370" fill="#639922">UART</text>
<text class="ts" x="148" y="382" fill="#639922">(MAVLink)</text>
<!-- PDB to RPi 5V -->
<path d="M280 170 L230 170 L230 450 L246 450" fill="none" stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Raspberry Pi -->
<rect class="box-purple" x="246" y="432" width="188" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="456" text-anchor="middle">Raspberry Pi 4B</text>
<text class="ts" x="340" y="472" text-anchor="middle">Companion computer</text>
<!-- RPi to Camera -->
<line x1="340" y1="484" x2="340" y2="540" stroke="#639922" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="515" fill="#639922">CSI</text>
<!-- Camera -->
<rect class="box-coral" x="270" y="540" width="140" height="44" rx="6" stroke-width="0.5"/>
<text class="th" x="340" y="558" text-anchor="middle">Camera Module</text>
<text class="ts" x="340" y="574" text-anchor="middle">RPi Cam v2 (8MP)</text>
<!-- Notes box -->
<rect x="460" y="430" width="190" height="100" rx="8" fill="none" stroke="#AAAAAA" stroke-width="0.5" stroke-dasharray="5 3"/>
<text class="th" x="555" y="450" text-anchor="middle">Signal flow notes</text>
<text class="ts" x="470" y="468">· ESC signal = PWM 1000–2000μs</text>
<text class="ts" x="470" y="484">· Pixhawk to RPi = 57600 baud</text>
<text class="ts" x="470" y="500">· GPS update rate = 10Hz</text>
<text class="ts" x="470" y="516">· Camera = 30fps OpenCV feed</text>
<!-- Title -->
<text class="th" x="340" y="660" text-anchor="middle">AeroNavX — Electrical Wiring Layout Diagram</text>
<text class="ts" x="340" y="678" text-anchor="middle">Unlox Drone Engineering Program  |  April 2026</text>
</svg>
